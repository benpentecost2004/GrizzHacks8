<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px;
    }
    h2 {
      font-size: 14px;
      color: #89b4fa;
      margin-bottom: 12px;
    }
    .field { margin-bottom: 10px; }
    label {
      display: block;
      font-size: 12px;
      color: #a6adc8;
      margin-bottom: 4px;
    }
    textarea, input[type="text"] {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #45475a;
      background: #313244;
      color: #cdd6f4;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
    }
    textarea { min-height: 60px; }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    input[type="range"] { flex: 1; accent-color: #89b4fa; }
    .conf-val { font-weight: 700; font-size: 13px; min-width: 30px; text-align: right; }
    button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    #btn-add { background: #89b4fa; color: #1e1e2e; }
    #btn-add:hover { background: #74a8fc; }
    #btn-send { background: #a6e3a1; color: #1e1e2e; width: 100%; margin-top: 8px; padding: 8px; }
    #btn-send:hover { background: #8edd88; }
    #btn-send:disabled { opacity: 0.4; cursor: default; }
    .queue { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
    .queue:empty::before {
      content: "No spans queued";
      font-size: 11px; color: #6c7086; font-style: italic;
    }
    .qi {
      display: flex; align-items: center; gap: 6px;
      background: #313244; padding: 5px 8px; border-radius: 5px; font-size: 12px;
    }
    .qi .qt { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .qi .qc { font-weight: 700; }
    .qi .qc.low { color: #a6e3a1; }
    .qi .qc.medium { color: #f9e2af; }
    .qi .qc.high { color: #f38ba8; }
    .qi button { padding: 2px 6px; font-size: 11px; background: #45475a; color: #cdd6f4; }
    hr { border: none; border-top: 1px solid #45475a; margin: 10px 0; }
    .hint { font-size: 11px; color: #6c7086; margin-top: 8px; line-height: 1.4; }
  </style>
</head>
<body>
  <h2>AI Detector — Test</h2>

  <div class="field">
    <label>Substring to highlight on page:</label>
    <input type="text" id="span-text" placeholder="select text on page, paste here">
  </div>

  <div class="row">
    <label>Confidence:</label>
    <input type="range" id="conf" min="0" max="100" value="72">
    <span class="conf-val" id="conf-val">72</span>
    <button id="btn-add">+ Add</button>
  </div>

  <div class="queue" id="queue"></div>
  <button id="btn-send" disabled>Highlight on page</button>

  <hr>
  <p class="hint">
    1. Select/copy text from the page<br>
    2. Paste substring here, set confidence<br>
    3. Add as many spans as needed<br>
    4. Click "Highlight on page"
  </p>

  <script src="test-popup.js"></script>
</body>
</html>
